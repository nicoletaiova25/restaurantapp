services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: restaurant-backend
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: restaurant-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend